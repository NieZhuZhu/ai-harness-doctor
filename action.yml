name: "AI Harness Doctor"
description: "Audit and drift-guard AGENTS.md and AI agent configs for stale commands/paths, conflicts, and security risks; emit SARIF."
author: "NieZhuZhu"
branding:
  icon: "check-circle"
  color: "purple"
inputs:
  path:
    description: "Repository path to scan."
    required: false
    default: "."
  command:
    description: "Subcommand to run (scan or drift)."
    required: false
    default: "scan"
  args:
    description: "Legacy extra arguments: first-line spaces/tabs split argv; no quote or shell parsing. Mutually exclusive with args-json."
    required: false
    default: ""
  args-json:
    description: "JSON array of exact extra CLI arguments. Mutually exclusive with args."
    required: false
    default: ""
  sarif-file:
    description: "Path to write the SARIF output file."
    required: false
    default: "ai-harness-doctor.sarif"
  version:
    description: "Implementation to run: bundled (selected Action ref) or an npm version/tag."
    required: false
    default: "bundled"
outputs:
  sarif-file:
    description: "Path to the generated SARIF file."
    value: ${{ steps.run.outputs.sarif-file }}
  status:
    description: "Report status: ok, findings, or maintenance."
    value: ${{ steps.run.outputs.status }}
  finding-count:
    description: "Number of active SARIF findings."
    value: ${{ steps.run.outputs.finding-count }}
  error-count:
    description: "Number of error-level findings."
    value: ${{ steps.run.outputs.error-count }}
  warning-count:
    description: "Number of warning-level findings."
    value: ${{ steps.run.outputs.warning-count }}
  note-count:
    description: "Number of note-level findings."
    value: ${{ steps.run.outputs.note-count }}
  resolved-baseline-count:
    description: "Number of repaired baseline entries ready to prune."
    value: ${{ steps.run.outputs.resolved-baseline-count }}
  health-score:
    description: "Drift health score (empty for scan or a legacy npm override)."
    value: ${{ steps.run.outputs.health-score }}
  health-grade:
    description: "Drift health grade (empty for scan or a legacy npm override)."
    value: ${{ steps.run.outputs.health-grade }}
runs:
  using: composite
  steps:
    - id: run
      shell: bash
      env:
        INPUT_ARGS: ${{ inputs.args }}
        INPUT_ARGS_JSON: ${{ inputs.args-json }}
        INPUT_COMMAND: ${{ inputs.command }}
        INPUT_PATH: ${{ inputs.path }}
        INPUT_SARIF_FILE: ${{ inputs.sarif-file }}
        INPUT_VERSION: ${{ inputs.version }}
        ACTION_PATH: ${{ github.action_path }}
      run: |
        set -euo pipefail

        case "$INPUT_COMMAND" in
          scan|drift) ;;
          *)
            echo "Unsupported command: $INPUT_COMMAND (expected scan or drift)" >&2
            exit 2
            ;;
        esac

        if [ "$INPUT_VERSION" = "bundled" ]; then
          cli="$ACTION_PATH/bin/cli.js"
        else
          install_dir="$RUNNER_TEMP/ai-harness-doctor-action"
          rm -rf "$install_dir"
          mkdir -p "$install_dir"
          npm install \
            --prefix "$install_dir" \
            --no-audit \
            --no-fund \
            --ignore-scripts \
            "ai-harness-doctor@$INPUT_VERSION"
          cli="$install_dir/node_modules/ai-harness-doctor/bin/cli.js"
        fi

        # A findings gate deliberately returns non-zero AFTER printing valid
        # SARIF. Capture that status so the report helper can publish Action
        # outputs + Job Summary, then restore the exact CLI exit code. Do not
        # rerun scan/drift or parse human-readable output in Bash.
        set +e
        node "$ACTION_PATH/bin/action-run.js" \
          "$cli" "$INPUT_SARIF_FILE" "$INPUT_COMMAND" "$INPUT_PATH"
        cli_status=$?
        set -e

        set +e
        node "$ACTION_PATH/bin/action-report.js" "$INPUT_SARIF_FILE" "$INPUT_COMMAND"
        report_status=$?
        set -e

        if [ "$report_status" -ne 0 ] && [ "$cli_status" -eq 0 ]; then
          exit "$report_status"
        fi
        exit "$cli_status"
