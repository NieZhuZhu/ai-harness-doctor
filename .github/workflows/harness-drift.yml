# ai-harness-doctor:guard
# Self-bootstrapped guard: this repo dogfoods the drift guard it ships. Unlike
# the template in assets/guard/harness-drift.yml (which runs the published
# `npx -y ai-harness-doctor`), this copy runs the repo's OWN local CLI/scripts so
# a change to scripts/ is gated by the very code being changed.
name: harness-drift

on:
  # Intentionally no paths/paths-ignore filter: D2/D7 may depend on any
  # repository-relative path named by AGENTS.md, so every PR must run the gate.
  pull_request:
  workflow_dispatch:

# The PR-review step needs write access to post inline review comments.
permissions:
  contents: read
  pull-requests: write

jobs:
  drift:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # actions/checkout@v7
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # actions/setup-node@v7
        with:
          node-version: "20"
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # actions/setup-python@v6
        with:
          python-version: "3.12"
      # Dogfood the local scan implementation and the committed, reviewable
      # debt register. Security remains unsuppressible.
      - name: Check new scan debt (self)
        shell: bash
        run: |
          set +e
          node bin/cli.js scan . --json \
            --baseline .ai-harness-doctor/scan-baseline.json \
            --fail-on-security \
            --fail-on-gaps \
            --fail-on-semantic \
            --fail-on-conflicts \
            > scan-report.json
          scan_status=$?
          set -e
          cat scan-report.json
          exit "$scan_status"
      # Dogfood: run this repo's local drift guard against itself (strict mode
      # promotes NOTICE findings to blocking so the repo holds itself to grade A).
      - name: Check AI harness drift (self)
        if: ${{ always() }}
        shell: bash
        run: |
          set +e
          node bin/cli.js drift . --strict --json > drift-report.json
          drift_status=$?
          set -e
          cat drift-report.json
          exit "$drift_status"
      # Combine active scan + drift findings into one complete review. The whole
      # posting step tolerates a missing/limited token (e.g. fork PRs) so the API
      # alone cannot fail the job. Anchor comments to the PR head commit, not
      # github.sha (which can be a synthetic merge ref).
      - name: Post scan and drift findings as one PR review
        if: ${{ always() && github.event_name == 'pull_request' }}
        env:
          GITHUB_TOKEN: ${{ github.token }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          python3 scripts/pr_review.py \
            --report scan-report.json \
            --report drift-report.json \
            --default-path AGENTS.md \
            --post \
            --pr "${{ github.event.number }}" \
            --commit "${{ github.event.pull_request.head.sha }}" \
            || echo "pr_review: posting skipped (token/API unavailable)"
      # Eval health-score gate: fail CI when committed eval results drop below the
      # threshold. Kept soft (guarded by the file existing) so this repo is not
      # blocked before an eval baseline is committed. Point RESULTS at a results
      # JSON produced by eval_run.py once you commit one.
      - name: Eval health-score gate
        if: ${{ always() }}
        run: |
          RESULTS="benchmark/self-eval/results-after-graded.json"
          if [ -f "$RESULTS" ]; then
            python3 scripts/eval_run.py --score "$RESULTS" --fail-under 80
          else
            echo "No committed eval results at $RESULTS; skipping eval gate."
            echo "Commit an eval results JSON and set --fail-under to enable it."
          fi
