name: release

on:
  push:
    tags:
      # Exact stable and prerelease tags only. The workflow itself maintains a
      # stable floating major Action tag (v0, v1, ...), which must never
      # recursively trigger another npm release.
      - "v*.*.*"

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # actions/checkout@v7

      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # actions/setup-python@v6
        with:
          python-version: "3.10"

      - name: Run unittest suite
        env:
          AI_HARNESS_DOCTOR_NO_UPDATE_CHECK: "1"
        run: python3 -m unittest discover -s tests -v

      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # actions/setup-node@v7
        with:
          node-version: "20"

      - name: Check CLI syntax
        run: node --check bin/cli.js

      - name: Check CLI help
        run: node bin/cli.js help

      - name: Check npm package contents
        run: npm pack --dry-run

      - name: Prepare release Action fixture
        env:
          FIXTURE_ROOT: ${{ runner.temp }}/release-drift-repo
        run: |
          mkdir -p "$FIXTURE_ROOT"
          cat > "$FIXTURE_ROOT/AGENTS.md" <<'EOF'
          # Project overview

          Deterministic release Action fixture.

          # Build & test

          No build commands are required.

          # Conventions

          Keep this fixture minimal.

          # Testing requirements

          Run the Action smoke test.

          # Safety

          Do not add secrets.

          # Commit & PR

          Use pull requests.
          EOF

      # Validate the exact tagged checkout through the composite wrapper before
      # publishing an immutable npm version. Both public command paths must work
      # through the wrapper; the new npm version cannot be installed until after
      # publish, so these calls deliberately use the tagged bundled code.
      - name: Pre-publish bundled scan self-test
        id: preflight-scan
        uses: ./
        with:
          command: scan
          path: .
          sarif-file: release-preflight-scan.sarif

      - name: Pre-publish bundled drift self-test
        id: preflight-drift
        uses: ./
        with:
          command: drift
          path: ${{ runner.temp }}/release-drift-repo
          sarif-file: ${{ runner.temp }}/release-preflight-drift.sarif

      - name: Validate pre-publish Action SARIF
        env:
          SCAN_SARIF: ${{ steps.preflight-scan.outputs.sarif-file }}
          DRIFT_SARIF: ${{ steps.preflight-drift.outputs.sarif-file }}
        run: |
          node -e '
            const fs = require("node:fs");
            const expected = require("./package.json").version;
            for (const [label, file] of Object.entries({
              scan: process.env.SCAN_SARIF,
              drift: process.env.DRIFT_SARIF,
            })) {
              const sarif = JSON.parse(fs.readFileSync(file, "utf8"));
              const run = sarif.runs && sarif.runs[0];
              const driver = run && run.tool && run.tool.driver;
              if (
                sarif.version !== "2.1.0"
                || !run
                || !Array.isArray(run.results)
                || !driver
                || driver.version !== expected
              ) {
                throw new Error(
                  `Tagged bundled ${label} mismatch: expected ${expected}, ` +
                  `got ${driver && driver.version}`,
                );
              }
            }
          '

      - name: Reject invalid tagged Action command
        id: invalid-action
        continue-on-error: true
        uses: ./
        with:
          command: definitely-not-a-command
          path: .

      - name: Validate tagged Action failure propagation
        env:
          OUTCOME: ${{ steps.invalid-action.outcome }}
        run: |
          if [ "$OUTCOME" != "failure" ]; then
            echo "Expected invalid tagged Action command to fail, got: $OUTCOME" >&2
            exit 1
          fi

  publish:
    needs: test
    runs-on: ubuntu-latest
    outputs:
      floating_tag: ${{ steps.release_meta.outputs.floating_tag }}
      is_prerelease: ${{ steps.release_meta.outputs.is_prerelease }}
      npm_tag: ${{ steps.release_meta.outputs.npm_tag }}
      package_version: ${{ steps.release_meta.outputs.package_version }}
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # actions/checkout@v7
        with:
          # The floating-tag update verifies this is the highest release tag
          # before moving vN, preventing an old workflow rerun from rolling
          # Action consumers back to an earlier release.
          fetch-depth: 0

      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # actions/setup-node@v7
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"

      - name: Verify tag matches package version
        run: |
          tag_version="${GITHUB_REF_NAME#v}"
          package_version="$(node -p "require('./package.json').version")"
          if [ "$tag_version" != "$package_version" ]; then
            echo "Version mismatch: tag $GITHUB_REF_NAME resolves to $tag_version, but package.json is $package_version."
            exit 1
          fi

      - name: Verify release tag is reachable from main
        run: |
          git fetch --no-tags origin "+refs/heads/main:refs/remotes/origin/main"
          release_commit="$(
            git rev-parse --verify "$GITHUB_REF_NAME^{commit}"
          )"
          if git merge-base --is-ancestor "$release_commit" refs/remotes/origin/main; then
            echo "Verified $GITHUB_REF_NAME ($release_commit) is reachable from origin/main."
          else
            status=$?
            if [ "$status" -eq 1 ]; then
              echo "Refusing release: $GITHUB_REF_NAME ($release_commit) is not reachable from origin/main." >&2
            else
              echo "Unable to verify $GITHUB_REF_NAME against origin/main (git status $status)." >&2
            fi
            exit 1
          fi

      - name: Determine release metadata
        id: release_meta
        run: |
          package_version="$(node -p "require('./package.json').version")"
          major="${package_version%%.*}"
          if [[ "$package_version" == *-* ]]; then
            is_prerelease="true"
            npm_tag="next"
            floating_tag=""
          else
            is_prerelease="false"
            npm_tag="latest"
            floating_tag="v$major"
          fi
          echo "package_version=$package_version" >> "$GITHUB_OUTPUT"
          echo "is_prerelease=$is_prerelease" >> "$GITHUB_OUTPUT"
          echo "npm_tag=$npm_tag" >> "$GITHUB_OUTPUT"
          echo "floating_tag=$floating_tag" >> "$GITHUB_OUTPUT"
          if [ "$is_prerelease" = "true" ]; then
            echo "Prerelease $GITHUB_REF_NAME will publish to npm tag $npm_tag without moving a stable Action tag."
          else
            echo "Stable release $GITHUB_REF_NAME will publish to npm tag $npm_tag and update Action tag $floating_tag."
          fi

      - name: Verify published npm identity or mark version unpublished
        id: npm_version
        run: |
          set -euo pipefail
          version="$(node -p "require('./package.json').version")"
          release_commit="$(git rev-parse --verify "$GITHUB_REF_NAME^{commit}")"
          registry_metadata="$RUNNER_TEMP/npm-view-$version.json"
          registry_stderr="$RUNNER_TEMP/npm-view-$version.stderr"

          set +e
          npm view "ai-harness-doctor@$version" version gitHead dist.shasum --json \
            > "$registry_metadata" 2> "$registry_stderr"
          lookup_status=$?
          set -e

          export REGISTRY_METADATA_FILE="$registry_metadata"
          export LOOKUP_STATUS="$lookup_status"
          lookup_state="$(
            node <<'NODE'
          const fs = require("node:fs");
          const status = Number(process.env.LOOKUP_STATUS);
          let payload;
          try {
            payload = JSON.parse(fs.readFileSync(process.env.REGISTRY_METADATA_FILE, "utf8"));
          } catch (_) {
            console.error(`npm registry lookup returned invalid JSON (status ${status})`);
            process.exit(1);
          }
          if (status === 0 && payload && typeof payload === "object" && !payload.error) {
            process.stdout.write("present");
          } else if (status !== 0 && payload && payload.error && payload.error.code === "E404") {
            process.stdout.write("missing");
          } else {
            console.error(`npm registry lookup failed (status ${status})`);
            process.exit(1);
          }
          NODE
          )"

          if [ "$lookup_state" = "missing" ]; then
            echo "ai-harness-doctor@$version is not published yet."
            echo "already_published=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          pack_metadata="$RUNNER_TEMP/npm-pack-$version.json"
          npm pack --dry-run --json > "$pack_metadata"

          export PACK_METADATA_FILE="$pack_metadata"
          export EXPECTED_COMMIT="$release_commit"
          export EXPECTED_VERSION="$version"
          node <<'NODE'
          const fs = require("node:fs");
          const registry = JSON.parse(
            fs.readFileSync(process.env.REGISTRY_METADATA_FILE, "utf8"),
          );
          const packedValue = JSON.parse(
            fs.readFileSync(process.env.PACK_METADATA_FILE, "utf8"),
          );
          const packed = Array.isArray(packedValue) && packedValue.length === 1
            ? packedValue[0]
            : null;
          const fail = (message) => {
            console.error(`Refusing release rerun: ${message}`);
            process.exit(1);
          };
          if (!registry || registry.version !== process.env.EXPECTED_VERSION) {
            fail("registry version does not match package.json");
          }
          if (
            typeof registry.gitHead !== "string"
            || !/^[0-9a-f]{40}$/.test(registry.gitHead)
          ) {
            fail("registry gitHead is missing or malformed");
          }
          if (registry.gitHead !== process.env.EXPECTED_COMMIT) {
            fail("registry gitHead does not match the exact release tag commit");
          }
          const registryShasum = registry["dist.shasum"];
          if (
            typeof registryShasum !== "string"
            || !/^[0-9a-f]{40}$/.test(registryShasum)
          ) {
            fail("registry dist.shasum is missing or malformed");
          }
          if (
            !packed
            || typeof packed.shasum !== "string"
            || !/^[0-9a-f]{40}$/.test(packed.shasum)
          ) {
            fail("npm pack metadata is missing or malformed");
          }
          if (packed.shasum !== registryShasum) {
            fail("npm pack shasum does not match the published artifact");
          }
          NODE

          echo "Verified ai-harness-doctor@$version matches $release_commit and the packed artifact; skipping npm publish."
          echo "already_published=true" >> "$GITHUB_OUTPUT"

      - name: Publish to npm
        if: steps.npm_version.outputs.already_published != 'true'
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_TAG: ${{ steps.release_meta.outputs.npm_tag }}
        run: npm publish --provenance --access public --tag "$NPM_TAG"

      - name: Create GitHub Release if missing
        env:
          GITHUB_TOKEN: ${{ github.token }}
          IS_PRERELEASE: ${{ steps.release_meta.outputs.is_prerelease }}
        run: |
          if gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1; then
            echo "GitHub Release $GITHUB_REF_NAME already exists."
          else
            release_args=(--generate-notes)
            if [ "$IS_PRERELEASE" = "true" ]; then
              release_args+=(--prerelease)
            fi
            gh release create "$GITHUB_REF_NAME" "${release_args[@]}"
          fi

      # Stable releases keep the floating major Action ref on the same commit as
      # the exact release tag. Prereleases never move that stable consumer ref.
      # The trigger above excludes bare vN tags, preventing recursion.
      - name: Update floating Action tag
        if: steps.release_meta.outputs.is_prerelease != 'true'
        env:
          FLOATING_TAG: ${{ steps.release_meta.outputs.floating_tag }}
        run: |
          latest_tag="$(
            git tag --list "$FLOATING_TAG.*.*" --sort=-v:refname \
              | grep -v -- '-' \
              | head -n 1
          )"
          if [ "$latest_tag" != "$GITHUB_REF_NAME" ]; then
            echo "Refusing to move $FLOATING_TAG backwards: latest tag is $latest_tag, current workflow is $GITHUB_REF_NAME."
            exit 1
          fi
          release_commit="$(git rev-parse "$GITHUB_REF_NAME^{commit}")"
          git tag -f "$FLOATING_TAG" "$release_commit"
          git push origin "refs/tags/$FLOATING_TAG" --force

  verify-action:
    name: verify-published-action
    needs: publish
    if: needs.publish.outputs.is_prerelease != 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # actions/checkout@v7
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # actions/checkout@v7
        with:
          ref: ${{ needs.publish.outputs.floating_tag }}
          path: published-action
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # actions/setup-node@v7
        with:
          node-version: "20"
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Verify floating tag target
        env:
          FLOATING_TAG: ${{ needs.publish.outputs.floating_tag }}
        run: |
          release_commit="$(git rev-parse HEAD)"
          floating_commit="$(git -C published-action rev-parse HEAD)"
          if [ "$floating_commit" != "$release_commit" ]; then
            echo "$FLOATING_TAG points to $floating_commit, expected release commit $release_commit."
            exit 1
          fi

      - name: Prepare published Action fixture
        env:
          FIXTURE_ROOT: ${{ runner.temp }}/published-drift-repo
        run: |
          mkdir -p "$FIXTURE_ROOT"
          cat > "$FIXTURE_ROOT/AGENTS.md" <<'EOF'
          # Project overview

          Deterministic published Action fixture.

          # Build & test

          No build commands are required.

          # Conventions

          Keep this fixture minimal.

          # Testing requirements

          Run the Action smoke test.

          # Safety

          Do not add secrets.

          # Commit & PR

          Use pull requests.
          EOF

      # Execute the separately checked-out floating ref. This avoids resolving
      # `@vN` before the publish job has moved it, while still testing the exact
      # remote Action content consumers receive.
      - name: Verify published floating bundled scan
        id: bundled-scan
        uses: ./published-action
        with:
          command: scan
          path: .
          sarif-file: published-major-scan.sarif

      # npm metadata and tarballs can take a short time to become visible after
      # publish. Bound the wait and verify the exact immutable version rather
      # than weakening the Action call to a mutable dist-tag.
      - name: Wait for exact npm package visibility
        env:
          PACKAGE_VERSION: ${{ needs.publish.outputs.package_version }}
        run: |
          set -euo pipefail
          visibility_dir="$RUNNER_TEMP/npm-visibility"
          rm -rf "$visibility_dir"
          mkdir -p "$visibility_dir"
          for attempt in {1..12}; do
            if npm pack \
              "ai-harness-doctor@$PACKAGE_VERSION" \
              --pack-destination "$visibility_dir" \
              --ignore-scripts \
              >/dev/null 2>&1; then
              echo "Verified ai-harness-doctor@$PACKAGE_VERSION is downloadable from npm."
              rm -rf "$visibility_dir"
              exit 0
            fi
            if [ "$attempt" -lt 12 ]; then
              echo "Waiting for ai-harness-doctor@$PACKAGE_VERSION on npm (attempt $attempt/12)."
              sleep 10
            fi
          done
          echo "ai-harness-doctor@$PACKAGE_VERSION was not downloadable after 12 attempts." >&2
          exit 1

      # Now that npm publish is complete, use the floating Action wrapper to
      # install and execute the exact immutable package from this release.
      - name: Verify published exact npm drift override
        id: npm-drift
        uses: ./published-action
        with:
          command: drift
          path: ${{ runner.temp }}/published-drift-repo
          version: ${{ needs.publish.outputs.package_version }}
          sarif-file: ${{ runner.temp }}/published-npm-drift.sarif

      - name: Validate published Action success matrix
        env:
          BUNDLED_SCAN: ${{ steps.bundled-scan.outputs.sarif-file }}
          NPM_DRIFT: ${{ steps.npm-drift.outputs.sarif-file }}
          FLOATING_TAG: ${{ needs.publish.outputs.floating_tag }}
          EXPECTED_VERSION: ${{ needs.publish.outputs.package_version }}
          INSTALL_DIR: ${{ runner.temp }}/ai-harness-doctor-action
          RUNNER_TEMP_PATH: ${{ runner.temp }}
        run: |
          node -e '
            const fs = require("node:fs");
            const path = require("node:path");
            const expected = process.env.EXPECTED_VERSION;
            for (const [label, file] of Object.entries({
              bundledScan: process.env.BUNDLED_SCAN,
              npmDrift: process.env.NPM_DRIFT,
            })) {
              const sarif = JSON.parse(fs.readFileSync(file, "utf8"));
              const run = sarif.runs && sarif.runs[0];
              const driver = run && run.tool && run.tool.driver;
              if (
                sarif.version !== "2.1.0"
                || !run
                || !Array.isArray(run.results)
                || !driver
                || driver.version !== expected
              ) {
                throw new Error(
                  `Published ${process.env.FLOATING_TAG} ${label} mismatch: ` +
                  `expected ${expected}, got ${driver && driver.version}`,
                );
              }
            }
            const install = fs.realpathSync(process.env.INSTALL_DIR);
            const temp = fs.realpathSync(process.env.RUNNER_TEMP_PATH);
            if (path.relative(temp, install).startsWith("..")) {
              throw new Error(`Published npm override escaped RUNNER_TEMP: ${install}`);
            }
            if (!fs.existsSync(path.join(
              install,
              "node_modules",
              "ai-harness-doctor",
              "bin",
              "cli.js",
            ))) {
              throw new Error("Published npm override package is missing");
            }
          '

  marketplace-reminder:
    needs: [publish, verify-action]
    if: >-
      ${{
        always() &&
        needs.publish.result == 'success' &&
        needs.publish.outputs.is_prerelease != 'true' &&
        needs.verify-action.result == 'success'
      }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
    steps:
      - name: Create Marketplace confirmation reminder
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          TAG: ${{ github.ref_name }}
        run: |
          title="Marketplace release confirmation: $TAG"
          # Keep only the newest stable release reminder actionable. Match the
          # exact generated title shape and never touch unrelated/current issues.
          gh issue list \
            --repo "$GH_REPO" \
            --state open \
            --limit 100 \
            --search "Marketplace release confirmation: in:title" \
            --json number,title \
            --jq '.[] | select(.title | test("^Marketplace release confirmation: v[0-9]+\\.[0-9]+\\.[0-9]+$")) | [.number, .title] | @tsv' \
            > "$RUNNER_TEMP/marketplace-open.tsv"
          while IFS=$'\t' read -r issue_number issue_title; do
            [ -n "$issue_number" ] || continue
            if [ "$issue_title" = "$title" ]; then
              continue
            fi
            gh issue close \
              --repo "$GH_REPO" \
              "$issue_number" \
              --comment "Superseded by Marketplace confirmation for $TAG."
          done < "$RUNNER_TEMP/marketplace-open.tsv"

          existing="$(
            gh issue list \
              --repo "$GH_REPO" \
              --state all \
              --limit 100 \
              --search "$title in:title" \
              --json number,title \
              --jq ".[] | select(.title == \"$title\") | .number" \
              | head -n 1
          )"
          if [ -n "$existing" ]; then
            echo "Reminder issue #$existing already exists."
            exit 0
          fi

          {
            echo "The automated release pipeline completed for $TAG."
            echo
            echo "- [ ] Confirm the GitHub Release is published to the Actions Marketplace"
            echo "- [ ] Confirm the categories include AI Assisted and Code review"
            echo "- [ ] Confirm the Marketplace page shows $TAG as Latest"
            echo "- [ ] Close this issue after the checks pass"
            echo
            echo "Release editor:"
            echo "https://github.com/$GH_REPO/releases/edit/$TAG?marketplace=true"
            echo
            echo "Marketplace listing:"
            echo "https://github.com/marketplace/actions/ai-harness-doctor"
          } > "$RUNNER_TEMP/marketplace-reminder.md"

          gh issue create \
            --repo "$GH_REPO" \
            --title "$title" \
            --body-file "$RUNNER_TEMP/marketplace-reminder.md"
