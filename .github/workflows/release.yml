name: release

on:
  push:
    tags:
      - "v*"

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Run unittest suite
        env:
          AI_HARNESS_DOCTOR_NO_UPDATE_CHECK: "1"
        run: python3 -m unittest discover -s tests -v

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Check CLI syntax
        run: node --check bin/cli.js

      - name: Check CLI help
        run: node bin/cli.js help

      - name: Check npm package contents
        run: npm pack --dry-run

  publish:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"

      - name: Verify tag matches package version
        run: |
          tag_version="${GITHUB_REF_NAME#v}"
          package_version="$(node -p "require('./package.json').version")"
          if [ "$tag_version" != "$package_version" ]; then
            echo "Version mismatch: tag $GITHUB_REF_NAME resolves to $tag_version, but package.json is $package_version."
            exit 1
          fi

      - name: Publish to npm
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish --provenance --access public

      - name: Create GitHub Release
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: gh release create "$GITHUB_REF_NAME" --generate-notes
