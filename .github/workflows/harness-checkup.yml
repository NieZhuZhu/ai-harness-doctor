# ai-harness-doctor:guard
# Self-bootstrapped guard: weekly (and on-demand) checkup that runs this repo's
# OWN scan/drift code against itself. Adapted from assets/guard/harness-checkup.yml
# to use the local CLI instead of `npx -y ai-harness-doctor`. Scheduled only, so
# it never gates pull requests; the harness issue it opens is the signal, and the
# job itself is kept non-failing so a scheduled run never shows a red X.
name: harness-checkup

on:
  schedule:
    - cron: "0 9 * * 1"
  workflow_dispatch:

permissions:
  issues: write
  contents: read

jobs:
  checkup:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # actions/checkout@v7
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # actions/setup-node@v7
        with:
          node-version: "20"
      - uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # actions/setup-python@v7.0.0
        with:
          python-version: "3.12"
      - name: Scan harness
        id: scan
        shell: bash
        run: |
          set +e
          node bin/cli.js scan . \
            --baseline .ai-harness-doctor/scan-baseline.json \
            --fail-on-security \
            --fail-on-gaps \
            --fail-on-semantic \
            --fail-on-conflicts \
            > harness-scan-report.md 2>&1
          echo "status=$?" >> "$GITHUB_OUTPUT"
          exit 0
      - name: Check drift
        id: drift
        shell: bash
        run: |
          set +e
          node bin/cli.js drift . --strict > harness-drift-report.md 2>&1
          drift_status=$?
          scan_status="${{ steps.scan.outputs.status }}"
          status="$drift_status"
          if [ "$scan_status" != "0" ]; then
            status="$scan_status"
          fi
          {
            echo "# Harness checkup"
            echo
            echo "## Scan"
            cat harness-scan-report.md
            echo
            echo "## Drift"
            cat harness-drift-report.md
          } > harness-checkup-report.md
          echo "status=$status" >> "$GITHUB_OUTPUT"
          exit 0
      - name: Upload harness checkup report
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # actions/upload-artifact@v7
        if: always()
        with:
          name: harness-checkup-report
          path: |
            harness-scan-report.md
            harness-drift-report.md
            harness-checkup-report.md
      - name: Reconcile harness issue
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
          TITLE: "🩺 Harness checkup: issues detected"
          CHECKUP_STATUS: ${{ steps.drift.outputs.status }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          COMMIT_SHA: ${{ github.sha }}
        shell: bash
        run: |
          set -euo pipefail
          gh_cli="${GH_CLI:-gh}"
          issue_number="$(
            "$gh_cli" issue list \
              --state open \
              --limit 100 \
              --search "$TITLE in:title" \
              --json number,title \
              --jq '[.[] | select(.title == env.TITLE) | .number][0] // empty'
          )"
          if [ "$CHECKUP_STATUS" != "0" ]; then
            body="$(cat harness-checkup-report.md)"
            if [ -n "$issue_number" ]; then
              "$gh_cli" issue comment "$issue_number" --body "$body"
            else
              "$gh_cli" issue create --title "$TITLE" --body "$body"
            fi
          elif [ -n "$issue_number" ]; then
            "$gh_cli" issue close \
              "$issue_number" \
              --comment "✅ Harness checkup recovered at \`$COMMIT_SHA\`. Verified by $RUN_URL."
          else
            echo "Harness checkup is healthy; no open incident issue."
          fi
