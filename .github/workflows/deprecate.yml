name: deprecate

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version to deprecate, for example 0.1.0"
        required: true
        type: string
      message:
        description: "Deprecation message shown by npm"
        required: true
        type: string

jobs:
  deprecate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # actions/setup-node@v7
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"

      - name: Deprecate npm version
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          VERSION: ${{ inputs.version }}
          MESSAGE: ${{ inputs.message }}
        run: |
          set -euo pipefail
          node <<'NODE'
          const version = process.env.VERSION || "";
          const message = process.env.MESSAGE || "";
          const identifier = "(?:0|[1-9][0-9]*|[0-9]*[A-Za-z-][0-9A-Za-z-]*)";
          const exactSemver = new RegExp(
            `^(?:0|[1-9][0-9]*)\\.(?:0|[1-9][0-9]*)\\.(?:0|[1-9][0-9]*)` +
              `(?:-${identifier}(?:\\.${identifier})*)?$`
          );
          if (!exactSemver.test(version)) {
            throw new Error("version must be an exact SemVer without a leading v or build metadata");
          }
          if (!message.trim()) {
            throw new Error("deprecation message must not be empty");
          }
          NODE
          npm deprecate "ai-harness-doctor@$VERSION" "$MESSAGE"
