name: test

on:
  push:
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # eslint 10 (dev-only) requires Node >= 20.19. Pin an exact Node 20.19.x that
      # ships a stable npm 10.x; npm 11 (bundled with newer Node) aborts with
      # "Exit handler never called" on this runner, leaving node_modules incomplete.
      - uses: actions/setup-node@v4
        with:
          node-version: "20.19.5"
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Pin npm to a stable release
        run: npm install -g npm@10.9.2
      - name: Install Node dev dependencies
        run: npm install --no-audit --no-fund
      - name: Install ruff
        run: pip install "ruff==0.15.20"
      - name: Lint (eslint + ruff + docs + adapters)
        run: npm run lint
  unittest:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.10", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Run unittest suite
        run: python3 -m unittest discover -s tests -v
      - name: Check README trilingual sync
        run: python3 scripts/check_readme_sync.py
      - name: Check adapters match single source
        run: python3 scripts/gen_adapters.py --check
  node:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node-version: ["16", "20", "22"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
      - name: Check CLI syntax
        run: node --check bin/cli.js && node --check bin/mcp-server.js
      - name: Check CLI help
        run: node bin/cli.js help
      - name: Run node --test suite
        run: node --test bin/*.test.js
      - name: Check npm package contents
        run: npm pack --dry-run
