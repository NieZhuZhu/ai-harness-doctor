name: test

on:
  push:
  pull_request:

jobs:
  unittest:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.10", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Run unittest suite
        run: python3 -m unittest discover -s tests -v
      - name: Check README trilingual sync
        run: python3 scripts/check_readme_sync.py
  node:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node-version: ["16", "20", "22"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
      - name: Check CLI syntax
        run: node --check bin/cli.js && node --check bin/mcp-server.js
      - name: Check CLI help
        run: node bin/cli.js help
      - name: Run node --test suite
        run: node --test bin/*.test.js
      - name: Check npm package contents
        run: npm pack --dry-run
