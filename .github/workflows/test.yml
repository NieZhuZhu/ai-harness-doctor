name: test

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # actions/checkout@v7
      # eslint 10 (dev-only) requires Node >= 20.19. Pin an exact Node 20.19.x.
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # actions/setup-node@v7
        with:
          node-version: "20.19.5"
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # actions/setup-python@v6
        with:
          python-version: "3.12"
      # `npm install`/`npm ci` deterministically aborts with "Exit handler never
      # called" on this runner while resolving the eslint 10 tree. Yarn classic
      # produces the same flat node_modules layout and is immune to that bug.
      - name: Install Node dev dependencies
        run: yarn install --non-interactive --ignore-engines
      - name: Install ruff
        run: pip install "ruff==0.15.20"
      - name: Lint (eslint + ruff + docs + adapters)
        run: npm run lint
  unittest:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.10", "3.12"]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # actions/checkout@v7
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      - name: Run unittest suite
        run: python3 -m unittest discover -s tests -v
      - name: Check README trilingual sync
        run: python3 scripts/check_readme_sync.py
      - name: Check adapters match single source
        run: python3 scripts/gen_adapters.py --check
  node:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node-version: ["16", "20", "22"]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # actions/checkout@v7
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # actions/setup-node@v7
        with:
          node-version: ${{ matrix.node-version }}
      - name: Check CLI syntax
        run: node --check bin/cli.js && node --check bin/mcp-server.js
      - name: Check CLI help
        run: node bin/cli.js help
      - name: Run node --test suite
        run: node --test bin/*.test.js
      - name: Check npm package contents
        run: npm pack --dry-run
