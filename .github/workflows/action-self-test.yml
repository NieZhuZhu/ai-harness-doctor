name: action-self-test

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  self-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # actions/checkout@v7
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # actions/setup-node@v7
        with:
          node-version: "20"
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Prepare Action success fixtures
        id: fixture
        env:
          FIXTURE_ROOT: ${{ runner.temp }}/clean-drift-repo
        run: |
          mkdir -p "$FIXTURE_ROOT"
          cat > "$FIXTURE_ROOT/AGENTS.md" <<'EOF'
          # Project overview

          Deterministic Action self-test fixture.

          # Build & test

          No build commands are required.

          # Conventions

          Keep this fixture minimal.

          # Testing requirements

          Run the Action smoke test.

          # Safety

          Do not add secrets.

          # Commit & PR

          Use pull requests.
          EOF
          mkdir -p "$FIXTURE_ROOT/.claude/rules" "$FIXTURE_ROOT/src"
          printf '%s\n' "export {};" > "$FIXTURE_ROOT/src/app.ts"
          cat > "$FIXTURE_ROOT/.claude/rules/future.md" <<'EOF'
          ---
          paths:
            - "future/**/*.ts"
          ---
          Use `npm test` for future TypeScript files.
          EOF
          checkout_version="$(node -p "require('./package.json').version")"
          published_version="$(npm view ai-harness-doctor@latest version)"
          if [[ ! "$published_version" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Expected npm latest to resolve to an exact stable version, got: $published_version" >&2
            exit 1
          fi
          echo "checkout_version=$checkout_version" >> "$GITHUB_OUTPUT"
          echo "published_version=$published_version" >> "$GITHUB_OUTPUT"

      # Dogfood the repository-root Action rather than bypassing its composite
      # wrapper with a direct CLI invocation. The default bundled implementation
      # executes the code from this exact Action ref.
      - name: Run bundled scan against this checkout
        id: bundled-scan
        uses: ./
        with:
          command: scan
          path: .
          sarif-file: bundled-scan.sarif

      - name: Run bundled drift against a clean fixture
        id: bundled-drift
        uses: ./
        with:
          command: drift
          path: ${{ runner.temp }}/clean-drift-repo
          sarif-file: ${{ runner.temp }}/bundled-drift.sarif

      - name: Run bundled scan against a Claude rule fixture
        id: claude-rule-scan
        uses: ./
        with:
          command: scan
          path: ${{ runner.temp }}/clean-drift-repo
          sarif-file: ${{ runner.temp }}/claude-rule-scan.sarif

      # This checks the npm-install override mechanism against the exact package
      # version already published from main. The bundled calls above, not this
      # compatibility call, are the evidence for the current PR's source code.
      - name: Run exact published npm override
        id: npm-scan
        uses: ./
        with:
          command: scan
          path: .
          version: ${{ steps.fixture.outputs.published_version }}
          sarif-file: ${{ runner.temp }}/npm-scan.sarif

      - name: Validate Action success matrix
        env:
          BUNDLED_SCAN: ${{ steps.bundled-scan.outputs.sarif-file }}
          BUNDLED_SCAN_STATUS: ${{ steps.bundled-scan.outputs.status }}
          BUNDLED_SCAN_COUNT: ${{ steps.bundled-scan.outputs.finding-count }}
          BUNDLED_SCAN_ERRORS: ${{ steps.bundled-scan.outputs.error-count }}
          BUNDLED_SCAN_WARNINGS: ${{ steps.bundled-scan.outputs.warning-count }}
          BUNDLED_SCAN_NOTES: ${{ steps.bundled-scan.outputs.note-count }}
          BUNDLED_SCAN_RESOLVED: ${{ steps.bundled-scan.outputs.resolved-baseline-count }}
          BUNDLED_DRIFT: ${{ steps.bundled-drift.outputs.sarif-file }}
          BUNDLED_DRIFT_STATUS: ${{ steps.bundled-drift.outputs.status }}
          BUNDLED_DRIFT_COUNT: ${{ steps.bundled-drift.outputs.finding-count }}
          BUNDLED_DRIFT_ERRORS: ${{ steps.bundled-drift.outputs.error-count }}
          BUNDLED_DRIFT_WARNINGS: ${{ steps.bundled-drift.outputs.warning-count }}
          BUNDLED_DRIFT_NOTES: ${{ steps.bundled-drift.outputs.note-count }}
          BUNDLED_DRIFT_RESOLVED: ${{ steps.bundled-drift.outputs.resolved-baseline-count }}
          BUNDLED_DRIFT_SCORE: ${{ steps.bundled-drift.outputs.health-score }}
          BUNDLED_DRIFT_GRADE: ${{ steps.bundled-drift.outputs.health-grade }}
          CLAUDE_RULE_SCAN: ${{ steps.claude-rule-scan.outputs.sarif-file }}
          CLAUDE_RULE_STATUS: ${{ steps.claude-rule-scan.outputs.status }}
          CLAUDE_RULE_COUNT: ${{ steps.claude-rule-scan.outputs.finding-count }}
          CLAUDE_RULE_ERRORS: ${{ steps.claude-rule-scan.outputs.error-count }}
          CLAUDE_RULE_WARNINGS: ${{ steps.claude-rule-scan.outputs.warning-count }}
          CLAUDE_RULE_NOTES: ${{ steps.claude-rule-scan.outputs.note-count }}
          CLAUDE_RULE_RESOLVED: ${{ steps.claude-rule-scan.outputs.resolved-baseline-count }}
          NPM_SCAN: ${{ steps.npm-scan.outputs.sarif-file }}
          NPM_SCAN_STATUS: ${{ steps.npm-scan.outputs.status }}
          NPM_SCAN_COUNT: ${{ steps.npm-scan.outputs.finding-count }}
          NPM_SCAN_ERRORS: ${{ steps.npm-scan.outputs.error-count }}
          NPM_SCAN_WARNINGS: ${{ steps.npm-scan.outputs.warning-count }}
          NPM_SCAN_NOTES: ${{ steps.npm-scan.outputs.note-count }}
          NPM_SCAN_RESOLVED: ${{ steps.npm-scan.outputs.resolved-baseline-count }}
          BUNDLED_VERSION: ${{ steps.fixture.outputs.checkout_version }}
          NPM_VERSION: ${{ steps.fixture.outputs.published_version }}
          INSTALL_DIR: ${{ runner.temp }}/ai-harness-doctor-action
          RUNNER_TEMP_PATH: ${{ runner.temp }}
        run: |
          node -e '
            const fs = require("node:fs");
            const path = require("node:path");
            const CATEGORY = {
              bundledScan: "ai-harness-doctor/scan/",
              bundledDrift: "ai-harness-doctor/drift/",
              claudeRuleScan: "ai-harness-doctor/scan/",
            };
            for (const [label, file, expected, outputPrefix] of [
              ["bundledScan", process.env.BUNDLED_SCAN, process.env.BUNDLED_VERSION, "BUNDLED_SCAN"],
              ["bundledDrift", process.env.BUNDLED_DRIFT, process.env.BUNDLED_VERSION, "BUNDLED_DRIFT"],
              ["claudeRuleScan", process.env.CLAUDE_RULE_SCAN, process.env.BUNDLED_VERSION, "CLAUDE_RULE"],
              ["npmScan", process.env.NPM_SCAN, process.env.NPM_VERSION, "NPM_SCAN"],
            ]) {
              const sarif = JSON.parse(fs.readFileSync(file, "utf8"));
              const run = sarif.runs && sarif.runs[0];
              const driver = run && run.tool && run.tool.driver;
              if (
                sarif.version !== "2.1.0"
                || !run
                || !Array.isArray(run.results)
                || !driver
                || driver.version !== expected
              ) {
                throw new Error(
                  `${label} mismatch: expected SARIF driver ${expected}, ` +
                  `got ${driver && driver.version}`,
                );
              }
              // Alert-lifecycle contract (Plan 042): each command run is keyed to
              // its own code-scanning category so uploading scan + drift for one
              // commit does not let the second close the first alerts, and every
              // result carries a stable partialFingerprints entry so alerts
              // survive unrelated edits. Only the bundled runs execute this
              // checkout code; the npm override runs the already-published
              // version, which may predate this contract, so it is exempt.
              if (label !== "npmScan") {
                const category = run.automationDetails && run.automationDetails.id;
                if (category !== CATEGORY[label]) {
                  throw new Error(
                    `${label} category mismatch: expected ${CATEGORY[label]}, got ${category}`,
                  );
                }
                for (const result of run.results) {
                  const fp = result.partialFingerprints
                    && result.partialFingerprints.aiHarnessDoctorIdentity;
                  if (!fp || typeof fp !== "string") {
                    throw new Error(`${label} result missing partialFingerprints`);
                  }
                }
              }
              if (
                label === "claudeRuleScan"
                && !run.results.some(
                  (item) => item.ruleId === "applicability/no-current-match",
                )
              ) {
                throw new Error(
                  "Claude rule fixture did not deliver applicability SARIF",
                );
              }
              const counts = { error: 0, warning: 0, note: 0 };
              for (const result of run.results) {
                const level = Object.prototype.hasOwnProperty.call(counts, result.level) ? result.level : "note";
                counts[level] += 1;
              }
              const expectedStatus = run.results.length === 0 ? "ok" : "findings";
              for (const [suffix, expectedValue] of [
                ["STATUS", expectedStatus],
                ["COUNT", String(run.results.length)],
                ["ERRORS", String(counts.error)],
                ["WARNINGS", String(counts.warning)],
                ["NOTES", String(counts.note)],
                ["RESOLVED", "0"],
              ]) {
                const actual = process.env[`${outputPrefix}_${suffix}`];
                if (actual !== expectedValue) {
                  throw new Error(
                    `${label} output ${suffix} mismatch: expected ${expectedValue}, got ${actual}`,
                  );
                }
              }
            }
            if (process.env.BUNDLED_DRIFT_SCORE !== "100" || process.env.BUNDLED_DRIFT_GRADE !== "A") {
              throw new Error(
                `bundledDrift health mismatch: ${process.env.BUNDLED_DRIFT_SCORE}/${process.env.BUNDLED_DRIFT_GRADE}`,
              );
            }
            const install = fs.realpathSync(process.env.INSTALL_DIR);
            const temp = fs.realpathSync(process.env.RUNNER_TEMP_PATH);
            if (path.relative(temp, install).startsWith("..")) {
              throw new Error(`npm override escaped RUNNER_TEMP: ${install}`);
            }
            if (!fs.existsSync(path.join(
              install,
              "node_modules",
              "ai-harness-doctor",
              "bin",
              "cli.js",
            ))) {
              throw new Error("npm override package was not installed in RUNNER_TEMP");
            }
          '

      - name: Create oversize tail-security fixture
        env:
          FIXTURE_ROOT: ${{ runner.temp }}/tail-security-repo
        run: |
          node -e '
            const fs = require("node:fs");
            const path = require("node:path");
            fs.mkdirSync(process.env.FIXTURE_ROOT, { recursive: true });
            const token = "ghp_" + "A".repeat(24);
            fs.writeFileSync(
              path.join(process.env.FIXTURE_ROOT, "AGENTS.md"),
              "safe prefix\n".repeat(100) + `token=${token}\n`,
            );
          '

      - name: Reject a tail credential through the repository Action
        id: tail-security
        continue-on-error: true
        uses: ./
        with:
          command: scan
          path: ${{ runner.temp }}/tail-security-repo
          args: "--max-bytes 100 --fail-on-security"
          sarif-file: ${{ runner.temp }}/tail-security.sarif

      - name: Validate tail-security Action SARIF and failure
        env:
          OUTCOME: ${{ steps.tail-security.outcome }}
          SARIF_FILE: ${{ runner.temp }}/tail-security.sarif
          STATUS: ${{ steps.tail-security.outputs.status }}
          FINDING_COUNT: ${{ steps.tail-security.outputs.finding-count }}
          ERROR_COUNT: ${{ steps.tail-security.outputs.error-count }}
        run: |
          node -e '
            const fs = require("node:fs");
            if (process.env.OUTCOME !== "failure") {
              throw new Error(`Expected tail credential to fail, got ${process.env.OUTCOME}`);
            }
            if (process.env.STATUS !== "findings") {
              throw new Error(`Expected findings output before failure, got ${process.env.STATUS}`);
            }
            const raw = fs.readFileSync(process.env.SARIF_FILE, "utf8");
            const sarif = JSON.parse(raw);
            const results = sarif.runs && sarif.runs[0] && sarif.runs[0].results;
            if (!Array.isArray(results) || !results.some((item) => item.ruleId === "security/secret")) {
              throw new Error("Tail credential did not reach Action SARIF");
            }
            if (raw.includes("ghp_")) {
              throw new Error("Tail credential value leaked into Action SARIF");
            }
            if (process.env.FINDING_COUNT !== String(results.length)) {
              throw new Error("Tail credential finding-count output mismatch");
            }
            const errors = results.filter((item) => item.level === "error").length;
            if (process.env.ERROR_COUNT !== String(errors)) {
              throw new Error("Tail credential error-count output mismatch");
            }
          '

      - name: Create resolved baseline fixture
        env:
          FIXTURE_ROOT: ${{ runner.temp }}/resolved-baseline-repo
        run: |
          mkdir -p "$FIXTURE_ROOT/.ai-harness-doctor"
          cat > "$FIXTURE_ROOT/AGENTS.md" <<'EOF'
          # Project overview
          Resolved baseline fixture.
          # Build & test
          No commands.
          # Conventions
          Keep it small.
          # Testing requirements
          None.
          # Safety
          No secrets.
          # Commit & PR
          Use pull requests.
          EOF
          cat > "$FIXTURE_ROOT/.ai-harness-doctor/drift-baseline.json" <<'EOF'
          {
            "version": 1,
            "findings": [
              {
                "check": "D1",
                "message": "Unknown package.json script `nope`",
                "path": null
              }
            ]
          }
          EOF

      - name: Report resolved baseline maintenance before failure
        id: baseline-maintenance
        continue-on-error: true
        uses: ./
        with:
          command: drift
          path: ${{ runner.temp }}/resolved-baseline-repo
          args: "--baseline ${{ runner.temp }}/resolved-baseline-repo/.ai-harness-doctor/drift-baseline.json --check-baseline"
          sarif-file: ${{ runner.temp }}/baseline-maintenance.sarif

      - name: Validate baseline maintenance Action report and failure
        env:
          OUTCOME: ${{ steps.baseline-maintenance.outcome }}
          SARIF_FILE: ${{ runner.temp }}/baseline-maintenance.sarif
          STATUS: ${{ steps.baseline-maintenance.outputs.status }}
          FINDING_COUNT: ${{ steps.baseline-maintenance.outputs.finding-count }}
          RESOLVED_COUNT: ${{ steps.baseline-maintenance.outputs.resolved-baseline-count }}
        run: |
          node -e '
            const fs = require("node:fs");
            if (process.env.OUTCOME !== "failure") {
              throw new Error(`Expected baseline maintenance to fail, got ${process.env.OUTCOME}`);
            }
            if (process.env.STATUS !== "maintenance") {
              throw new Error(`Expected maintenance output, got ${process.env.STATUS}`);
            }
            if (process.env.FINDING_COUNT !== "0" || process.env.RESOLVED_COUNT !== "1") {
              throw new Error(
                `Baseline maintenance counts mismatch: active=${process.env.FINDING_COUNT}, resolved=${process.env.RESOLVED_COUNT}`,
              );
            }
            const sarif = JSON.parse(fs.readFileSync(process.env.SARIF_FILE, "utf8"));
            const run = sarif.runs && sarif.runs[0];
            const metadata = run && run.properties && run.properties.aiHarnessDoctor;
            if (!run || run.results.length !== 0 || metadata.resolvedBaselineCount !== 1) {
              throw new Error("Baseline maintenance SARIF metadata mismatch");
            }
          '

      # A composite Action must not turn installation/CLI failures into a green
      # check. This deliberately invalid command should fail the Action step.
      - name: Reject an invalid command
        id: invalid
        continue-on-error: true
        uses: ./
        with:
          command: definitely-not-a-command
          path: .

      - name: Assert invalid command failed
        env:
          OUTCOME: ${{ steps.invalid.outcome }}
        run: |
          if [ "$OUTCOME" != "failure" ]; then
            echo "Expected invalid Action command to fail, got: $OUTCOME" >&2
            exit 1
          fi
