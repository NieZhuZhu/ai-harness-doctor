# ai-harness-doctor:guard
name: harness-drift

on:
  pull_request:
    paths:
      - package.json
      - package-lock.json
      - pnpm-lock.yaml
      - Makefile
      - pyproject.toml
      - AGENTS.md
      - CLAUDE.md
      - .cursorrules
      - .windsurfrules
      - .github/copilot-instructions.md
      - GEMINI.md
      - .clinerules
      - .cursor/rules/**
      - .github/workflows/**
  workflow_dispatch:

# The PR-review step needs write access to post inline review comments.
permissions:
  contents: read
  pull-requests: write

jobs:
  drift:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Check AI harness drift
        run: npx -y ai-harness-doctor@latest drift . --strict
      # On a pull request, surface drift findings as inline PR review comments.
      # check_drift.py --json emits a machine-readable report; pr_review.py turns
      # located findings into inline comments and posts a single review. It runs
      # even when the gate above failed so reviewers see the annotations. Drift
      # findings (D1/D2/D6) are line-based against AGENTS.md, so --default-path
      # attaches them to that file. Anchor comments to the PR head commit, not
      # github.sha (which can be a synthetic merge ref).
      - name: Post drift findings as PR review comments
        if: ${{ always() && github.event_name == 'pull_request' }}
        env:
          GITHUB_TOKEN: ${{ github.token }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          npx -y ai-harness-doctor@latest drift . --json > drift-report.json || true
          npx -y ai-harness-doctor@latest review \
            --report drift-report.json \
            --default-path AGENTS.md \
            --post \
            --pr "${{ github.event.number }}" \
            --commit "${{ github.event.pull_request.head.sha }}"
      # Eval health-score gate: fail CI when the committed eval results drop
      # below the threshold. Point --score at a results JSON produced by
      # `eval_run.py` (or its --matrix mode) and committed to the repo; the gate
      # exits code 5 when the health score is under --fail-under.
      #
      # The path below is an EXAMPLE — replace it with your repo's committed
      # results file (e.g. benchmark/results-after.json). Kept as a soft gate
      # (`|| true`-free but guarded by the file existing) so a repo without an
      # eval baseline is not blocked; delete the guard once you commit results.
      - name: Eval health-score gate
        if: ${{ always() }}
        run: |
          RESULTS="benchmark/self-eval/results-after-graded.json"
          if [ -f "$RESULTS" ]; then
            npx -y ai-harness-doctor@latest eval --score "$RESULTS" --fail-under 80
          else
            echo "No committed eval results at $RESULTS; skipping eval gate."
            echo "Commit an eval results JSON and set --fail-under to enable it."
          fi
