# ai-harness-doctor:guard
name: harness-drift

on:
  # Intentionally no paths/paths-ignore filter: D2/D7 may depend on any
  # repository-relative path named by AGENTS.md, so every PR must run the gate.
  pull_request:
  workflow_dispatch:

# The PR-review step needs write access to post inline review comments.
permissions:
  contents: read
  pull-requests: write

jobs:
  drift:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # actions/checkout@v7
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # actions/setup-node@v7
        with:
          node-version: "20"
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Check new scan debt
        shell: bash
        env:
          SCAN_BASELINE: .ai-harness-doctor/scan-baseline.json
        run: |
          scan_args=(scan . --json --fail-on-security --fail-on-gaps --fail-on-semantic --fail-on-conflicts)
          # Optional adoption path: commit this explicit debt register after
          # reviewing `scan . --write-baseline "$SCAN_BASELINE"`.
          # The guard never creates or refreshes it automatically, and HIGH
          # security findings remain unsuppressible.
          if [ -f "$SCAN_BASELINE" ]; then
            scan_args+=(--baseline "$SCAN_BASELINE")
          fi
          set +e
          npx -y ai-harness-doctor@latest "${scan_args[@]}" > scan-report.json
          scan_status=$?
          set -e
          cat scan-report.json
          exit "$scan_status"
      - name: Check AI harness drift
        if: ${{ always() }}
        shell: bash
        run: |
          set +e
          npx -y ai-harness-doctor@latest drift . --strict --json > drift-report.json
          drift_status=$?
          set -e
          cat drift-report.json
          exit "$drift_status"
      # On a pull request, combine active scan + drift findings into one review.
      # Baselined scan debt is not active and is therefore not posted. Located
      # findings become inline comments; the complete summary preserves
      # unlocated/conflict findings and the HTTP-422 fallback. Anchor comments
      # to the PR head commit, not github.sha (a synthetic merge ref).
      - name: Post scan and drift findings as one PR review
        if: ${{ always() && github.event_name == 'pull_request' }}
        env:
          GITHUB_TOKEN: ${{ github.token }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          npx -y ai-harness-doctor@latest review \
            --report scan-report.json \
            --report drift-report.json \
            --default-path AGENTS.md \
            --post \
            --pr "${{ github.event.number }}" \
            --commit "${{ github.event.pull_request.head.sha }}"
      # Eval health-score gate: fail CI when the committed eval results drop
      # below the threshold. Point --score at a results JSON produced by
      # `eval_run.py` (or its --matrix mode) and committed to the repo; the gate
      # exits code 5 when the health score is under --fail-under.
      #
      # The path below is an EXAMPLE — replace it with your repo's committed
      # results file (e.g. benchmark/results-after.json). Kept as a soft gate
      # (`|| true`-free but guarded by the file existing) so a repo without an
      # eval baseline is not blocked; delete the guard once you commit results.
      - name: Eval health-score gate
        if: ${{ always() }}
        run: |
          RESULTS="benchmark/self-eval/results-after-graded.json"
          if [ -f "$RESULTS" ]; then
            npx -y ai-harness-doctor@latest eval --score "$RESULTS" --fail-under 80
          else
            echo "No committed eval results at $RESULTS; skipping eval gate."
            echo "Commit an eval results JSON and set --fail-under to enable it."
          fi
