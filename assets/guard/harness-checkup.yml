# ai-harness-doctor:guard
name: harness-checkup

on:
  schedule:
    - cron: "0 9 * * 1"
  workflow_dispatch:

permissions:
  issues: write
  contents: read

jobs:
  checkup:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # actions/checkout@v7
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # actions/setup-node@v7
        with:
          node-version: "20"
      - name: Scan harness
        id: scan
        shell: bash
        run: |
          set +e
          scan_args=(scan . --fail-on-security --fail-on-gaps --fail-on-semantic --fail-on-conflicts)
          # Optional adoption path: commit this explicit debt register after
          # reviewing `scan . --write-baseline "$SCAN_BASELINE"`.
          # The guard never creates or refreshes it automatically, and HIGH
          # security findings remain unsuppressible.
          if [ -f "$SCAN_BASELINE" ]; then
            scan_args+=(--baseline "$SCAN_BASELINE")
          fi
          npx -y ai-harness-doctor@latest "${scan_args[@]}" > harness-scan-report.md 2>&1
          echo "status=$?" >> "$GITHUB_OUTPUT"
          exit 0
        env:
          SCAN_BASELINE: .ai-harness-doctor/scan-baseline.json
      - name: Check drift
        id: drift
        shell: bash
        run: |
          set +e
          npx -y ai-harness-doctor@latest drift . --strict > harness-drift-report.md 2>&1
          drift_status=$?
          scan_status="${{ steps.scan.outputs.status }}"
          status="$drift_status"
          if [ "$scan_status" != "0" ]; then
            status="$scan_status"
          fi
          {
            echo "# Harness checkup"
            echo
            echo "## Scan"
            cat harness-scan-report.md
            echo
            echo "## Drift"
            cat harness-drift-report.md
          } > harness-checkup-report.md
          echo "status=$status" >> "$GITHUB_OUTPUT"
          exit 0
      - name: Upload harness checkup report
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # actions/upload-artifact@v7
        if: always()
        with:
          name: harness-checkup-report
          path: |
            harness-scan-report.md
            harness-drift-report.md
            harness-checkup-report.md
      - name: Reconcile harness issue
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
          TITLE: "🩺 Harness checkup: issues detected"
          CHECKUP_STATUS: ${{ steps.drift.outputs.status }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          COMMIT_SHA: ${{ github.sha }}
        shell: bash
        run: |
          set -euo pipefail
          gh_cli="${GH_CLI:-gh}"
          issue_number="$(
            "$gh_cli" issue list \
              --state open \
              --limit 100 \
              --search "$TITLE in:title" \
              --json number,title \
              --jq '[.[] | select(.title == env.TITLE) | .number][0] // empty'
          )"
          if [ "$CHECKUP_STATUS" != "0" ]; then
            body="$(cat harness-checkup-report.md)"
            if [ -n "$issue_number" ]; then
              "$gh_cli" issue comment "$issue_number" --body "$body"
            else
              "$gh_cli" issue create --title "$TITLE" --body "$body"
            fi
          elif [ -n "$issue_number" ]; then
            "$gh_cli" issue close \
              "$issue_number" \
              --comment "✅ Harness checkup recovered at \`$COMMIT_SHA\`. Verified by $RUN_URL."
          else
            echo "Harness checkup is healthy; no open incident issue."
          fi
      - name: Fail when harness issues remain
        if: always()
        env:
          CHECKUP_STATUS: ${{ steps.drift.outputs.status }}
        shell: bash
        run: |
          if [ -z "$CHECKUP_STATUS" ]; then
            echo "Harness checkup did not produce a status." >&2
            exit 1
          fi
          if [ "$CHECKUP_STATUS" != "0" ]; then
            echo "Harness checkup reported status $CHECKUP_STATUS." >&2
            exit "$CHECKUP_STATUS"
          else
            echo "Harness checkup passed."
          fi
