name: ai-harness-drift

on:
  pull_request:
  push:

jobs:
  drift:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - name: Check AI harness drift
        run: python3 .claude/skills/ai-harness-doctor/scripts/check_drift.py .
